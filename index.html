<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minha Lista de Compras</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
</head>
<body>

    <div id="splash-screen">
        <div class="splash-content">
            <img src="logo_lista_de_compras.png" alt="Logo" class="splash-logo">
            <p>Carregando sua lista...</p>
        </div>
    </div>

    <header>
        <h1>Lista de Compras</h1>
    </header>

    <div class="container">
        <div class="input-group">
            <input type="text" id="itemInput" placeholder="Nome do item...">
            <select id="categoryInput">
                <option value="Alimentação">Alimentação</option>
                <option value="Higiene e Limpeza">Higiene e Limpeza</option>
                <option value="Utensílios Domésticos">Utensílios Domésticos</option>
                <option value="Cama, Mesa e Banho">Cama, Mesa e Banho</option>
                <option value="Bazar">Bazar</option>
            </select>
            <button onclick="addItem()" id="addBtn">Adicionar</button>
        </div>

        <div id="listsContainer">
            </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
